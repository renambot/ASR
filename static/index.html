<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live ASR — NVIDIA NIM Speech-to-Text</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <!-- Inline data-URI fallback for browsers that don't fetch the SVG file. -->
  <link rel="alternate icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230f1115'/%3E%3Crect x='12' y='6' width='8' height='13' rx='4' fill='%2376b900'/%3E%3Cpath d='M9 15a7 7 0 0 0 14 0' fill='none' stroke='%2376b900' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='16' y1='22' x2='16' y2='26.5' stroke='%2376b900' stroke-width='2' stroke-linecap='round'/%3E%3Cline x1='11.5' y1='26.5' x2='20.5' y2='26.5' stroke='%2376b900' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E" />
  <style>
    :root {
      --bg: #0f1115; --panel: #171a21; --border: #262b36;
      --text: #e6e9ef; --muted: #8b93a3; --accent: #76b900; /* NVIDIA green */
      --interim: #b9c0cd; --danger: #ff5c5c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column;
    }
    header {
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    }
    h1 { font-size: 16px; margin: 0; font-weight: 600; }
    h1 span { color: var(--accent); }
    .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-left: auto; }
    select, button {
      font: inherit; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--panel); color: var(--text); cursor: pointer;
    }
    select { min-width: 220px; }
    button.primary { background: var(--accent); color: #0f1115; border-color: var(--accent); font-weight: 600; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); }
    .dot.connected { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .dot.reconnecting { background: #f5a623; animation: pulse 1s infinite; }
    .dot.error { background: var(--danger); }
    @keyframes pulse { 50% { opacity: 0.3; } }
    .content { flex: 1; display: flex; min-height: 0; }
    main { flex: 1; overflow-y: auto; padding: 24px 20px; }
    #transcript {
      max-width: 900px; margin: 0 auto; font-size: 19px; line-height: 1.7; white-space: pre-wrap; word-wrap: break-word;
    }
    #transcript .line { margin: 0 0 6px 0; }
    #transcript .speaker-tag { font-weight: 600; }
    #interim { color: var(--interim); font-style: italic; }

    /* Speaker naming side panel */
    aside#speakers {
      width: 250px; flex: 0 0 auto; border-left: 1px solid var(--border);
      background: var(--panel); overflow-y: auto; padding: 16px 14px;
      display: flex; flex-direction: column; gap: 10px;
    }
    aside#speakers h2 {
      margin: 0 0 4px 0; font-size: 12px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--muted);
    }
    #speaker-list { display: flex; flex-direction: column; gap: 10px; }
    .speaker-item { display: flex; align-items: center; gap: 8px; }
    .speaker-swatch { width: 10px; height: 10px; border-radius: 50%; flex: 0 0 auto; }
    .speaker-item .sp-id { font-size: 12px; color: var(--muted); flex: 0 0 auto; min-width: 20px; }
    .speaker-item input {
      flex: 1; min-width: 0; font: inherit; font-size: 13px; padding: 6px 8px;
      border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text);
    }
    .speaker-item input:focus { outline: none; border-color: var(--accent); }
    #speakers-empty { font-size: 13px; color: var(--muted); font-style: italic; }
    @media (max-width: 760px) {
      .content { flex-direction: column; }
      aside#speakers {
        width: auto; border-left: none; border-top: 1px solid var(--border);
        max-height: 180px;
      }
    }
    footer {
      border-top: 1px solid var(--border); padding: 10px 20px; display: flex; gap: 18px;
      align-items: center; font-size: 13px; color: var(--muted);
    }
    footer .spacer { margin-left: auto; }
    .placeholder { color: var(--muted); font-style: italic; }
  </style>
</head>
<body>
  <header>
    <h1>Live <span>ASR</span></h1>
    <div class="controls">
      <select id="mic" title="Microphone"></select>
      <button id="refresh" title="Refresh device list">↻</button>
      <button id="toggle" class="primary">Start</button>
      <div class="status"><span id="dot" class="dot"></span><span id="state">idle</span></div>
    </div>
  </header>

  <div class="content">
    <main>
      <div id="transcript"><span class="placeholder">Select a microphone and press Start. Speak as long as you like — the transcript grows below.</span><span id="interim"></span></div>
    </main>

    <aside id="speakers">
      <h2>Speakers</h2>
      <div id="speaker-list"></div>
      <div id="speakers-empty">No speakers detected yet. Names you enter here replace “Speaker N” in the transcript and in Copy / Download.</div>
    </aside>
  </div>

  <footer>
    <span id="elapsed">00:00:00</span>
    <span id="words">0 words</span>
    <span class="spacer"></span>
    <button id="copy">Copy</button>
    <button id="download">Download .txt</button>
    <button id="savewav" title="Download the captured audio as a WAV for debugging">Save WAV</button>
    <button id="clear">Clear</button>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
