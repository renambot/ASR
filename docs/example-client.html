<!doctype html>
<!-- The simplest complete client for the EVL ASR SDK (@evluic/asr-client).

     One button, one status line, one transcript box. Point "Server" at a
     running EVL ASR proxy (e.g. https://your-host/speech) and press Start.

     The SDK is loaded from the npm CDN, so this page works from anywhere.
     Alternatives: your proxy serves it at /sdk/asr-client.js, or use the
     repo checkout at ../packages/asr-client/src/asr-client.js.

     If this page is served from a DIFFERENT origin than the proxy, set
     ALLOWED_ORIGINS on the proxy (e.g. ALLOWED_ORIGINS="https://your-app")
     so its HTTP API allows CORS and its WebSocket accepts the page. Also,
     browsers require a secure context (https:// or localhost) for mic
     access. -->

<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EVL ASR — minimal SDK client</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 20px; }
    .row { display: flex; gap: 8px; align-items: center; margin: 12px 0; }
    input, select { flex: 1; padding: 8px; font: inherit; min-width: 0; }
    button { padding: 8px 20px; font: inherit; cursor: pointer; }
    #status { color: #666; font-size: 14px; }
    #transcript {
      border: 1px solid #ccc; border-radius: 6px; padding: 12px; min-height: 200px;
      white-space: pre-wrap; line-height: 1.6;
    }
    #interim { color: #999; font-style: italic; }
  </style>
</head>
<body>
  <h1>EVL ASR — minimal SDK client</h1>

  <div class="row">
    <label for="server">Server</label>
    <input id="server" type="text" value="https://arcade.evl.uic.edu/speech"
           placeholder="EVL ASR proxy base URL" />
  </div>

  <div class="row">
    <label for="mic">Mic</label>
    <select id="mic"></select>
    <button id="toggle">Start</button>
    <button id="summarize" title="One-shot LLM summary of the transcript (needs an LLM on the proxy)">Summarize</button>
    <span id="status">idle</span>
  </div>

  <div id="transcript"><span id="final"></span><span id="interim"></span></div>

  <!-- The SDK: one file, no dependencies (@evluic/asr-client on npm).
       Also served by a deployed proxy at /sdk/asr-client.js. -->
  <script src="https://cdn.jsdelivr.net/npm/@evluic/asr-client@0.4/dist/asr-client.min.js"></script>
  <script>
    const toggleBtn = document.getElementById("toggle");
    const statusEl = document.getElementById("status");
    const finalEl = document.getElementById("final");
    const interimEl = document.getElementById("interim");
    const micSel = document.getElementById("mic");

    let asr = null;

    // Fill the mic selector. Browsers only reveal device labels after a
    // permission grant, so this is called again after the first start().
    async function loadMics() {
      const mics = await AsrClient.listMicrophones();
      const current = micSel.value;
      micSel.innerHTML = "";
      mics.forEach((m) => {
        const opt = document.createElement("option");
        opt.value = m.deviceId;
        opt.textContent = m.label;
        micSel.appendChild(opt);
      });
      if (current) micSel.value = current;
    }

    async function start() {
      asr = new AsrClient({
        serverUrl: document.getElementById("server").value.trim(),
        deviceId: micSel.value || undefined,   // undefined = system default
        diarization: false,  // no speaker labels; keep the example simple
      });

      // Live hypothesis: replace-style grey text while you speak.
      asr.on("interim", (text) => { interimEl.textContent = " " + text; });

      // Finalized segment: append it as a line.
      asr.on("segment", (seg) => {
        finalEl.textContent += seg.text + "\n";
        interimEl.textContent = "";
      });

      asr.on("status", (state, message) => {
        statusEl.textContent = message || state;
      });
      asr.on("error", (e) => { statusEl.textContent = "error: " + e.message; });

      await asr.start();   // asks for mic permission, then streams
      toggleBtn.textContent = "Stop";
      micSel.disabled = true;      // the mic is fixed for the session
      loadMics();                  // permission granted: labels are visible now
    }

    async function stop() {
      statusEl.textContent = "finalizing…";
      await asr.stop();    // flushes the tail, then closes the session
      // Keep `asr` around: its transcript survives, so Summarize still works.
      toggleBtn.textContent = "Start";
      micSel.disabled = false;
    }

    toggleBtn.onclick = async () => {
      toggleBtn.disabled = true;
      try { await (asr && asr.running ? stop() : start()); }
      catch (e) { statusEl.textContent = "error: " + e.message; asr = null; micSel.disabled = false; }
      finally { toggleBtn.disabled = false; }
    };

    // One-shot LLM summary of the transcript so far (works after Stop too),
    // using a custom prompt. Call asr.summarize() with no options to use the
    // proxy's default prompt instead, or asr.analyze("...") for ad-hoc prompts.
    const SUMMARY_PROMPT =
      "Summarize this conversation in at most three short bullet points, " +
      "then one line naming the overall topic. Plain text only.";
    const sumBtn = document.getElementById("summarize");
    sumBtn.onclick = async () => {
      if (!asr || asr.segments.length === 0) {
        statusEl.textContent = "nothing to summarize";
        return;
      }
      sumBtn.disabled = true;
      statusEl.textContent = "summarizing…";
      try {
        const s = await asr.summarize({ instruction: SUMMARY_PROMPT });
        finalEl.textContent += "\n— Summary (" + (s.model || "LLM") + ") —\n" + s.result + "\n\n";
        statusEl.textContent = asr.running ? "listening" : "idle";
      } catch (e) {
        statusEl.textContent = "error: " + e.message;
      } finally {
        sumBtn.disabled = false;
      }
    };

    loadMics();   // labels appear once the first session grants permission
  </script>
</body>
</html>
