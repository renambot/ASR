# ---------------------------------------------------------------------------
# Expose an ASR NIM (listening on 127.0.0.1:7777) under the /asr/ route.
# The realtime endpoint is a WebSocket, so we must upgrade the connection
# and turn off buffering + read timeouts so multi-hour sessions stay open.
# ---------------------------------------------------------------------------

# Put this ONCE in the http{} context (not inside server{}). It flips the
# Connection header to "upgrade" only for WebSocket requests.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl;
    server_name asr.example.com;          # <-- your hostname

    ssl_certificate     /etc/ssl/certs/asr.pem;      # <-- your cert
    ssl_certificate_key /etc/ssl/private/asr.key;    # <-- your key

    # /asr/v1/realtime  ->  http://127.0.0.1:7777/v1/realtime
    # The trailing slash on both location and proxy_pass strips the /asr prefix.
    location /asr/ {
        proxy_pass http://127.0.0.1:7777/;

        # --- WebSocket upgrade (required for /v1/realtime) ---
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # --- pass-through headers ---
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- long-lived streaming ---
        proxy_buffering    off;    # stream events as they arrive
        proxy_read_timeout 86400s; # 24h; raise if you speak longer than a day
        proxy_send_timeout 86400s;

        # realtime append events can be large (base64 PCM, up to ~15 MB)
        client_max_body_size 20m;
    }

    # Optional: redirect the bare /asr to /asr/ so both work.
    location = /asr {
        return 301 /asr/;
    }
}
